<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 두근두근 수행평가 발표 순서 추첨 🎲</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gamja+Flower&family=Jua&display=swap');

        :root {
            --bg-color: #f0f7f4;
            --main-color: #6c5ce7;
            --accent-color: #ff7675;
            --card-color: #ffffff;
            --text-color: #2d3436;
        }

        body {
            font-family: 'Jua', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            background: var(--card-color);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border: 4px solid var(--main-color);
            text-align: center;
            max-width: 600px;
            width: 100%;
            box-sizing: border-box;
        }

        h1 {
            color: var(--main-color);
            font-size: 2.5rem;
            margin-top: 0;
            text-shadow: 2px 2px 0px #ffeaa7;
        }

        .setup-box {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            background: #dfe6e9;
            padding: 15px;
            border-radius: 15px;
            align-items: center;
        }

        label {
            font-size: 1.2rem;
        }

        input {
            width: 70px;
            padding: 8px;
            font-family: 'Jua', sans-serif;
            font-size: 1.2rem;
            border: 2px solid var(--main-color);
            border-radius: 10px;
            text-align: center;
        }

        .btn {
            font-family: 'Jua', sans-serif;
            font-size: 1.5rem;
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 0px rgba(0,0,0,0.2);
        }

        .btn-main {
            background-color: var(--main-color);
            color: white;
        }

        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 7px 0px rgba(0,0,0,0.2); }
        .btn-main:active { transform: translateY(3px); box-shadow: 0 2px 0px rgba(0,0,0,0.2); }

        /* 디스플레이 화면 (전광판) */
        .display-card {
            background: #2d3436;
            color: #55efc4;
            height: 200px;
            border-radius: 20px;
            margin: 25px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 6rem;
            border: 8px solid #636e72;
            position: relative;
            text-shadow: 0 0 20px #55efc4;
            overflow: hidden;
        }

        /* 슬롯머신/릴 애니메이션 효과 */
        .roll-animation {
            animation: bounce 0.1s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(-5px); }
            to { transform: translateY(5px); }
        }

        /* 축하 팡파레 효과 (폭죽) */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #9b59b6;
            border-radius: 50%;
            animation: fireworks 1s ease-out infinite;
            opacity: 0;
        }

        @keyframes fireworks {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0.5); opacity: 0; }
        }

        /* 히스토리 섹션 */
        .history-section {
            margin-top: 25px;
            text-align: left;
        }

        .history-title {
            font-size: 1.3rem;
            color: var(--main-color);
            border-bottom: 2px dashed var(--main-color);
            padding-bottom: 5px;
            margin-bottom: 10px;
        }

        .history-list {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            min-height: 45px;
        }

        .history-item {
            background: var(--accent-color);
            color: white;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 1.1rem;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        .status-msg {
            font-family: 'Gamja Flower', cursive;
            font-size: 1.4rem;
            color: #7f8c8d;
            height: 30px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎲 발표 순서 대추첨 🎲</h1>
    
    <div class="setup-box">
        <label for="startNum">시작 번호:</label>
        <input type="number" id="startNum" value="1" min="1">
        <label for="endNum">끝 번호:</label>
        <input type="number" id="endNum" value="25" min="1">
    </div>

    <div class="display-card" id="displayCard">
        <span id="numDisplay">Ready</span>
    </div>

    <button class="btn btn-main" id="drawBtn" onclick="startDraw()">🚀 다음 번호 뽑기 🚀</button>
    
    <div class="status-msg" id="statusMsg">뽑기 버튼을 누르면 대추첨이 시작됩니다!</div>

    <div class="history-section">
        <div class="history-title">⏱️ 확정된 발표 순서</div>
        <div class="history-list" id="historyList"></div>
    </div>
</div>

<script>
    let currentPool = [];
    let isRolling = false;
    let isInitialized = false;

    // 초기 번호 풀 생성
    function initPool() {
        const start = parseInt(document.getElementById('startNum').value);
        const end = parseInt(document.getElementById('endNum').value);

        if (isNaN(start) || !isNaN(end) && start > end) {
            alert('시작 번호와 끝 번호를 올바르게 입력해주세요.');
            return false;
        }

        currentPool = [];
        for (let i = start; i <= end; i++) {
            currentPool.push(i);
        }
        
        document.getElementById('historyList').innerHTML = '';
        isInitialized = true;
        return true;
    }

    // 범위 입력 변경 시 초기화 유도
    document.getElementById('startNum').addEventListener('change', () => { isInitialized = false; });
    document.getElementById('endNum').addEventListener('change', () => { isInitialized = false; });

    function startDraw() {
        if (isRolling) return;

        // 범위 입력이 바뀌었거나 처음 시작할 때 배열 초기화
        if (!isInitialized) {
            if (!initPool()) return;
        }

        if (currentPool.length === 0) {
            document.getElementById('numDisplay').innerText = "끝!";
            document.getElementById('statusMsg').innerText = "🎉 모든 번호가 추첨되었습니다! 초기화하려면 범위를 변경하세요.";
            return;
        }

        isRolling = true;
        const displayCard = document.getElementById('displayCard');
        const numDisplay = document.getElementById('numDisplay');
        const statusMsg = document.getElementById('statusMsg');
        
        // 화면 연출 스타일 가동 (사운드 대용 릴 진동)
        displayCard.classList.add('roll-animation');
        displayCard.style.color = '#ffeaa7';
        displayCard.style.textShadow = '0 0 20px #ffeaa7';
        statusMsg.innerText = "두구두구두구두구... 어떤 번호가 나올까요?!";

        let duration = 1500; // 애니메이션 지속시간 (1.5초)
        let intervalTime = 50; // 번호가 바뀌는 속도 (0.05초)
        let localInterval;

        // 굴러가는 효과음 느낌의 가짜 랜덤 번호 노출
        localInterval = setInterval(() => {
            const randomVisualIdx = Math.floor(Math.random() * currentPool.length);
            numDisplay.innerText = currentPool[randomVisualIdx];
        }, intervalTime);

        // 1.5초 후 최종 결과 결정
        setTimeout(() => {
            clearInterval(localInterval);
            displayCard.classList.remove('roll-animation');
            
            // 진짜 당첨 번호 선정
            const actualIdx = Math.floor(Math.random() * currentPool.length);
            const pickedNumber = currentPool.splice(actualIdx, 1)[0];

            // 당첨 연출
            numDisplay.innerText = pickedNumber;
            displayCard.style.color = '#55efc4';
            displayCard.style.textShadow = '0 0 20px #55efc4';
            statusMsg.innerText = `축하합니다! ${pickedNumber}번 당첨! 🎉 (남은 인원: ${currentPool.length}명)`;

            // 폭죽 이펙트 생성
            createFireworks();

            // 발표 순서 히스토리에 기록 추가
            const historyList = document.getElementById('historyList');
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerText = `${historyList.children.length + 1}등: ${pickedNumber}번`;
            historyList.appendChild(item);

            isRolling = false;
        }, duration);
    }

    // 간단한 화면 폭죽 연출 함수
    function createFireworks() {
        const card = document.getElementById('displayCard');
        for (let i = 0; i < 30; i++) {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            
            // 랜덤 방향 분산 계산
            const angle = Math.random() * Math.PI * 2;
            const distance = 50 + Math.random() * 150;
            const x = Math.cos(angle) * distance;
            const y = Math.sin(angle) * distance;
            
            confetti.style.setProperty('--x', `${x}px`);
            confetti.style.setProperty('--y', `${y}px`);
            
            // 다양한 파스텔 색상 부여
            const colors = ['#ff7675', '#fdcb6e', '#00cec9', '#6c5ce7', '#e84393'];
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            
            // 생성 위치 중심 설정
            confetti.style.left = '50%';
            confetti.style.top = '50%';
            
            card.appendChild(confetti);
            
            // 애니메이션 종료 후 제거
            setTimeout(() => confetti.remove(), 1000);
        }
    }
</script>

</body>
</html>
